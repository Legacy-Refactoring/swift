services:
  db:
    image: postgres:17
    container_name: legacy_db
    environment:
      POSTGRES_DB: legacy_payments
      POSTGRES_USER: legacy_user
      POSTGRES_PASSWORD: legacy_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./seeder.sql:/docker-entrypoint-initdb.d/02-seeder.sql:ro

  swift:
    image: swift:6.1
    container_name: legacy_swift
    volumes:
      - ./legacy.swift:/app/legacy.swift
    working_dir: /app
    command: swift legacy.swift
    depends_on:
      - db

volumes:
  postgres_data: